<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕاپۆرتی دەوام - Pay Time Tour</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: #dce8f8; padding: 20px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #2d4a7a; color: white; padding: 15px 20px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .back-btn { background: #d32f2f; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .back-btn:hover { background: #b71c1c; }
        .content { background: white; padding: 25px; border-radius: 0 0 10px 10px; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filters input, .filters select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; }
        .report-table { width: 100%; border-collapse: collapse; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 12px; }
        .report-table th { background: #2d4a7a; color: white; }
        .export-btn { background: #2e7d32; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        .total-row { background: #e8e8e8; font-weight: bold; }
        h3 { color: #2d4a7a; margin-bottom: 15px; border-right: 4px solid #2d4a7a; padding-right: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 ڕاپۆرتی دەوام (Attendance Report)</h1>
        <a href="index.html" class="back-btn">◀ گەڕانەوە بۆ سەرەکی</a>
    </div>
    <div class="content">
        <div class="filters">
            <input type="date" id="startDate" placeholder="ڕێکەوتی دەستپێک">
            <input type="date" id="endDate" placeholder="ڕێکەوتی کۆتایی">
            <input type="text" id="filterEmployee" placeholder="ناوی کارمەند">
            <button class="export-btn" onclick="exportReport()">📎 Export to CSV</button>
            <button onclick="loadReport()" style="background:#2d4a7a; color:white; border:none; padding:8px 16px; border-radius:5px; cursor:pointer;">🔍 نمایش</button>
        </div>
        
        <div style="overflow-x: auto;">
            <table class="report-table" id="reportTable">
                <thead>
                    <tr><th>#</th><th>ڕێکەوت</th><th>ناوی کارمەند</th><th>کۆد</th><th>هاتن</th><th>دەرچوون</th><th>کۆی کاتژمێر</th></tr>
                </thead>
                <tbody id="reportBody"></tbody>
                <tfoot id="reportFooter"></tfoot>
            </table>
        </div>
    </div>
</div>

<script>
    function loadReport() {
        let records = JSON.parse(localStorage.getItem('attendanceRecords') || '[]');
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const filterEmployee = document.getElementById('filterEmployee').value.trim().toLowerCase();
        
        let filtered = records;
        if (startDate) filtered = filtered.filter(r => r.date >= startDate);
        if (endDate) filtered = filtered.filter(r => r.date <= endDate);
        if (filterEmployee) filtered = filtered.filter(r => r.employee.toLowerCase().includes(filterEmployee));
        
        // Group by employee and date
        const grouped = {};
        filtered.forEach(record => {
            const key = `${record.employee}_${record.date}`;
            if (!grouped[key]) {
                grouped[key] = { employee: record.employee, code: record.employeeCode, date: record.date, checkin: null, checkout: null };
            }
            if (record.type === 'checkin') grouped[key].checkin = record.time;
            if (record.type === 'checkout') grouped[key].checkout = record.time;
        });
        
        const data = Object.values(grouped).sort((a, b) => b.date.localeCompare(a.date));
        
        const tbody = document.getElementById('reportBody');
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">هیچ تۆمارێک نەدۆزرایەوە</td></tr>';
            document.getElementById('reportFooter').innerHTML = '';
            return;
        }
        
        tbody.innerHTML = data.map((item, idx) => {
            let hours = '—';
            if (item.checkin && item.checkout) {
                const [inH, inM] = item.checkin.split(':').map(Number);
                const [outH, outM] = item.checkout.split(':').map(Number);
                let diffH = outH - inH;
                let diffM = outM - inM;
                if (diffM < 0) { diffH--; diffM += 60; }
                hours = `${diffH}:${diffM.toString().padStart(2,'0')}`;
            }
            return `<tr><td>${idx+1}</td><td>${item.date}</td><td>${item.employee}</td><td>${item.code}</td><td>${item.checkin || '—'}</td><td>${item.checkout || '—'}</td><td>${hours}</td></tr>`;
        }).join('');
        
        document.getElementById('reportFooter').innerHTML = `<tr class="total-row"><td colspan="6"><strong>کۆی گشتی تۆمارەکان</strong></td><td><strong>${data.length}</strong></td></tr>`;
    }
    
    function exportReport() {
        const records = JSON.parse(localStorage.getItem('attendanceRecords') || '[]');
        let csv = "ژمارە,ڕێکەوت,ناوی کارمەند,کۆد,جۆر,کات,شوێن\n";
        records.forEach((r, idx) => {
            csv += `${idx+1},${r.date},${r.employee},${r.employeeCode},${r.type === 'checkin' ? 'هاتن' : 'دەرچوون'},${r.time},${r.location}\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `attendance_report_${new Date().toISOString().slice(0,19)}.csv`;
        link.click();
        alert('ڕاپۆرت Export کرا!');
    }
    
    loadReport();
</script>
</body>
</html>
