<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مۆڵەتەکان - Pay Time Tour</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: #dce8f8; padding: 20px; direction: rtl; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { background: #2d4a7a; color: white; padding: 15px 20px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .back-btn { background: #d32f2f; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .back-btn:hover { background: #b71c1c; }
        .content { background: white; padding: 25px; border-radius: 0 0 10px 10px; }
        .silver-box { background: #e8e8e8; border: 1px solid #ccc; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .info-row { display: flex; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        .info-label { width: 140px; font-weight: 700; color: #2d4a7a; }
        .info-value { flex: 1; }
        .info-value input, .info-value select { width: 100%; max-width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        .leave-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .leave-table th, .leave-table td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 12px; }
        .leave-table th { background: #2d4a7a; color: white; }
        .approved { color: #2e7d32; font-weight: bold; }
        .pending { color: #ff9800; font-weight: bold; }
        .rejected { color: #d32f2f; font-weight: bold; }
        .save-btn { background: #2e7d32; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; }
        h3 { color: #2d4a7a; margin-bottom: 15px; border-right: 4px solid #2d4a7a; padding-right: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 مۆڵەتەکان (Leave Requests)</h1>
        <a href="index.html" class="back-btn">◀ گەڕانەوە بۆ سەرەکی</a>
    </div>
    <div class="content">
        <div class="silver-box">
            <h3>➕ داواکردنی مۆڵەت</h3>
            <div class="info-row">
                <div class="info-label">ناوی کارمەند:</div>
                <div class="info-value"><select id="employeeSelect"><option value="">-- هەڵبژێرە --</option><option value="ئەحمەد علی">ئەحمەد علی</option><option value="سارا محمد">سارا محمد</option><option value="کارزان حسێن">کارزان حسێن</option></select></div>
            </div>
            <div class="info-row">
                <div class="info-label">جۆری مۆڵەت:</div>
                <div class="info-value"><select id="leaveType"><option value="ساڵانە">ساڵانە</option><option value="نەخۆشی">نەخۆشی</option><option value="بێ مووچە">بێ مووچە</option><option value="فریاکەوتن">فریاکەوتن</option></select></div>
            </div>
            <div class="info-row">
                <div class="info-label">ڕێکەوتی دەستپێک:</div>
                <div class="info-value"><input type="date" id="startDate"></div>
            </div>
            <div class="info-row">
                <div class="info-label">ڕێکەوتی کۆتایی:</div>
                <div class="info-value"><input type="date" id="endDate"></div>
            </div>
            <div class="info-row">
                <div class="info-label">هۆکار:</div>
                <div class="info-value"><textarea id="leaveReason" rows="2" placeholder="هۆکاری مۆڵەت..."></textarea></div>
            </div>
            <button class="save-btn" onclick="saveLeaveRequest()">📨 ناردنی داواکاری</button>
        </div>
        
        <h3>📋 لیستی داواکارییەکان</h3>
        <div style="overflow-x: auto;">
            <table class="leave-table" id="leaveTable">
                <thead><tr><th>#</th><th>ناوی کارمەند</th><th>جۆر</th><th>ڕێکەوتی دەستپێک</th><th>ڕێکەوتی کۆتایی</th><th>ژمارەی ڕۆژ</th><th>دۆخ</th><th>هۆکار</th><th>کردار</th></tr></thead>
                <tbody id="leaveTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function saveLeaveRequest() {
        const employee = document.getElementById('employeeSelect').value;
        const leaveType = document.getElementById('leaveType').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const reason = document.getElementById('leaveReason').value;
        
        if (!employee || !startDate) { alert('تکایە کارمەند و ڕێکەوتی دەستپێک پڕ بکەوە!'); return; }
        
        let days = 1;
        if (endDate) {
            const start = new Date(startDate);
            const end = new Date(endDate);
            days = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
        }
        
        const leaveRequest = {
            id: Date.now(),
            employee: employee,
            leaveType: leaveType,
            startDate: startDate,
            endDate: endDate || startDate,
            days: days,
            reason: reason,
            status: 'pending'
        };
        
        let requests = JSON.parse(localStorage.getItem('leaveRequests') || '[]');
        requests.push(leaveRequest);
        localStorage.setItem('leaveRequests', JSON.stringify(requests));
        
        alert('داواکاری مۆڵەت نێردرا! چاوەڕوانی پەسەندکردن بکە.');
        document.getElementById('employeeSelect').value = '';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('leaveReason').value = '';
        loadLeaveRequests();
    }
    
    function updateStatus(id, newStatus) {
        let requests = JSON.parse(localStorage.getItem('leaveRequests') || '[]');
        requests = requests.map(r => r.id === id ? { ...r, status: newStatus } : r);
        localStorage.setItem('leaveRequests', JSON.stringify(requests));
        loadLeaveRequests();
    }
    
    function loadLeaveRequests() {
        const requests = JSON.parse(localStorage.getItem('leaveRequests') || '[]');
        const tbody = document.getElementById('leaveTableBody');
        tbody.innerHTML = '';
        requests.sort((a, b) => b.id - a.id).forEach((record, index) => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = index + 1;
            row.insertCell(1).innerText = record.employee;
            row.insertCell(2).innerText = record.leaveType;
            row.insertCell(3).innerText = record.startDate;
            row.insertCell(4).innerText = record.endDate;
            row.insertCell(5).innerText = record.days;
            row.insertCell(6).innerHTML = `<span class="${record.status}">${record.status === 'pending' ? 'چاوەڕوان' : record.status === 'approved' ? 'پەسەندکراو' : 'ڕەتکراو'}</span>`;
            row.insertCell(7).innerText = record.reason || '—';
            row.insertCell(8).innerHTML = record.status === 'pending' ? 
                `<button onclick="updateStatus(${record.id}, 'approved')" style="background:#2e7d32;color:white;border:none;padding:4px 8px;border-radius:3px;margin:2px;">پەسەند</button>
                 <button onclick="updateStatus(${record.id}, 'rejected')" style="background:#d32f2f;color:white;border:none;padding:4px 8px;border-radius:3px;margin:2px;">ڕەت</button>` :
                `<button onclick="deleteLeaveRequest(${record.id})" style="background:#d32f2f;color:white;border:none;padding:4px 10px;border-radius:3px;">سڕینەوە</button>`;
        });
    }
    
    function deleteLeaveRequest(id) {
        if (confirm('دڵنیای لە سڕینەوە؟')) {
            let requests = JSON.parse(localStorage.getItem('leaveRequests') || '[]');
            requests = requests.filter(r => r.id !== id);
            localStorage.setItem('leaveRequests', JSON.stringify(requests));
            loadLeaveRequests();
        }
    }
    
    loadLeaveRequests();
</script>
</body>
</html>
