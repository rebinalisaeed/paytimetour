<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چوونە ژوورەوە - Pay Time Tour</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #B8CFF0; /* هەمان ڕەنگی پاشبنەمای خشتەکە */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: #F0F0F0;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #999;
        }

        .login-header {
            background-color: #636353;
            color: white;
            padding: 15px;
            margin: -40px -40px 30px -40px;
            border-radius: 8px 8px 0 0;
        }

        .login-header h2 {
            margin: 0;
            font-size: 20px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* بۆ ئەوەی پادینگ کار نەکاتە سەر پانی */
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #636353;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background-color: #4a4a3e;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 20px;
            }
            .login-header {
                margin: -20px -20px 20px -20px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h2>سیستەمی Pay Time Tour</h2>
            <p>بەخێرهاتی بۆ پەڕەی چوونە ژوورەوە</p>
        </div>

        <form action="index.html"> <div class="input-group">
                <label for="username">ناوی بەکارهێنەر:</label>
                <input type="text" id="username" name="username" placeholder="ناوی خۆت بنووسە..." required>
            </div>

            <div class="input-group">
                <label for="password">وشەی نهێنی:</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>

            <button type="submit" class="login-btn">چوونە ژوورەوە</button>
        </form>

        <div class="footer-text">
            هەموو مافەکان پارێزراوە بۆ Pay Time Tour &copy; 2026
        </div>
    </div>

</body>
</html>
