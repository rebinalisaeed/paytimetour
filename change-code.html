<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گۆڕینی کۆدی کارمەند - Pay Time Tour</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: #dce8f8; padding: 20px; direction: rtl; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: #2d4a7a; color: white; padding: 15px 20px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .back-btn { background: #d32f2f; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .back-btn:hover { background: #b71c1c; }
        .content { background: white; padding: 25px; border-radius: 0 0 10px 10px; }
        .info-row { display: flex; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .info-label { width: 160px; font-weight: 700; color: #2d4a7a; }
        .info-value { flex: 1; }
        .info-value input { width: 100%; max-width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        .update-btn { background: #2e7d32; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🆔 گۆڕینی کۆدی کارمەند</h1>
        <a href="index.html" class="back-btn">◀ گەڕانەوە</a>
    </div>
    <div class="content">
        <div class="info-row"><div class="info-label">کۆدی ئێستا:</div><div class="info-value"><input type="text" placeholder="1001"></div></div>
        <div class="info-row"><div class="info-label">کۆدی نوێ:</div><div class="info-value"><input type="text" placeholder="2001"></div></div>
        <button class="update-btn" onclick="alert('کۆدی کارمەند گۆڕدرا!')">🔄 گۆڕینی کۆد</button>
    </div>
</div>
</body>
</html>
