<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تۆمارکردنی هاتن (Check-in) - Pay Time Tour</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: #dce8f8; padding: 20px; direction: rtl; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: #2d4a7a; color: white; padding: 15px 20px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .back-btn { background: #d32f2f; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .back-btn:hover { background: #b71c1c; }
        .content { background: white; padding: 25px; border-radius: 0 0 10px 10px; }
        .silver-box { background: #e8e8e8; border: 1px solid #ccc; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .info-row { display: flex; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        .info-label { width: 140px; font-weight: 700; color: #2d4a7a; font-size: 13px; }
        .info-value { flex: 1; }
        .info-value input, .info-value select { width: 100%; max-width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; }
        .checkin-btn { background: #2e7d32; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; width: 100%; margin-top: 10px; }
        .checkin-btn:hover { background: #1b5e20; }
        .location-info { background: #f5f5f5; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 12px; color: #666; }
        .success-box { background: #c8e6c9; border: 1px solid #2e7d32; border-radius: 8px; padding: 15px; margin-bottom: 20px; display: none; }
        .success-box.show { display: block; }
        .datetime { font-size: 24px; font-weight: 700; color: #2d4a7a; text-align: center; margin-bottom: 20px; }
        h3 { color: #2d4a7a; margin-bottom: 15px; border-right: 4px solid #2d4a7a; padding-right: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✅ تۆمارکردنی هاتن (Check-in)</h1>
        <a href="index.html" class="back-btn">◀ گەڕانەوە بۆ سەرەکی</a>
    </div>
    <div class="content">
        <div class="datetime" id="currentDateTime"></div>
        
        <div class="success-box" id="successBox">
            <p style="color:#2e7d32; text-align:center;">✅ هاتن بە سەرکەوتوویی تۆمار کرا!</p>
        </div>
        
        <div class="silver-box">
            <h3>📋 زانیاری کارمەند</h3>
            <div class="info-row">
                <div class="info-label">ناوی کارمەند:</div>
                <div class="info-value">
                    <select id="employeeSelect">
                        <option value="">-- هەڵبژاردنی کارمەند --</option>
                        <option value="ئەحمەد علی">ئەحمەد علی (1001)</option>
                        <option value="سارا محمد">سارا محمد (1002)</option>
                        <option value="کارزان حسێن">کارزان حسێن (1003)</option>
                    </select>
                </div>
            </div>
            <div class="info-row">
                <div class="info-label">کۆدی کارمەند:</div>
                <div class="info-value"><input type="text" id="employeeCode" placeholder="کۆدی کارمەند"></div>
            </div>
        </div>
        
        <div class="silver-box">
            <h3>📍 شوێنی هاتن</h3>
            <div class="info-row">
                <div class="info-label">شوێن:</div>
                <div class="info-value">
                    <select id="locationSelect">
                        <option value="ئۆفیسی سەرەکی">ئۆفیسی سەرەکی</option>
                        <option value="لقی باکور">لقی باکور</option>
                        <option value="Remote (لە ماڵەوە)">Remote (لە ماڵەوە)</option>
                        <option value="شوێنی دەرەوە (Field)">شوێنی دەرەوە (Field)</option>
                    </select>
                </div>
            </div>
            <div class="info-row">
                <div class="info-label">ئامێر/دەستکاری:</div>
                <div class="info-value">
                    <select id="deviceSelect">
                        <option value="ئامێری تۆمارکردن (Fingerprint)">ئامێری تۆمارکردن (Fingerprint)</option>
                        <option value="مۆبایل (GPS)">مۆبایل (GPS)</option>
                        <option value="کارت (RFID)">کارت (RFID)</option>
                        <option value="دەستکاری (Manual)">دەستکاری (Manual)</option>
                    </select>
                </div>
            </div>
            <div class="location-info" id="locationInfo">
                <span>📍 تێبینی: تکایە دڵنیابەوە لە شوێنی کارکردنت</span>
            </div>
        </div>
        
        <div class="silver-box">
            <h3>⏰ کاتی هاتن</h3>
            <div class="info-row">
                <div class="info-label">کات (ئۆتۆماتیک):</div>
                <div class="info-value"><span id="checkinTime">--:--:--</span></div>
            </div>
            <div class="info-row">
                <div class="info-label">ڕێکەوت:</div>
                <div class="info-value"><span id="checkinDate">--/--/----</span></div>
            </div>
            <div class="info-row">
                <div class="info-label">تێبینی:</div>
                <div class="info-value"><textarea id="checkinNote" rows="2" placeholder="تێبینی (ئەگەر هەیە)..."></textarea></div>
            </div>
        </div>
        
        <button class="checkin-btn" onclick="saveCheckin()">✅ تۆمارکردنی هاتن (Check-in)</button>
    </div>
</div>

<script>
    // نوێکردنەوەی کات و ڕێکەوت
    function updateDateTime() {
        const now = new Date();
        const dateStr = now.toLocaleDateString('ckb');
        const timeStr = now.toLocaleTimeString('ckb');
        document.getElementById('currentDateTime').innerHTML = `${dateStr} | ${timeStr}`;
        document.getElementById('checkinTime').innerText = timeStr;
        document.getElementById('checkinDate').innerText = dateStr;
    }
    
    updateDateTime();
    setInterval(updateDateTime, 1000);
    
    // پڕکردنەوەی کۆدی کارمەند بەپێی ناو
    document.getElementById('employeeSelect').addEventListener('change', function() {
        const selected = this.value;
        const codeMap = {
            'ئەحمەد علی': '1001',
            'سارا محمد': '1002',
            'کارزان حسێن': '1003'
        };
        if (codeMap[selected]) {
            document.getElementById('employeeCode').value = codeMap[selected];
        } else {
            document.getElementById('employeeCode').value = '';
        }
    });
    
    // گۆڕینی تێبینی شوێن بەپێی هەڵبژاردن
    document.getElementById('locationSelect').addEventListener('change', function() {
        const location = this.value;
        const infoMap = {
            'ئۆفیسی سەرەکی': '📍 ئۆفیسی سەرەکی - شەقامی ٤٠ مەتر، هەولێر',
            'لقی باکور': '📍 لقی باکور - شەقامی کوردستان، هەولێر',
            'Remote (لە ماڵەوە)': '🏠 Remote - لە ماڵەوە کاردەکات (پێویست بە GPS نیە)',
            'شوێنی دەرەوە (Field)': '🌍 شوێنی دەرەوە - تکایە شوێنی ورد دیاری بکە'
        };
        document.getElementById('locationInfo').innerHTML = `<span>${infoMap[location] || '📍 تکایە شوێنێک هەڵبژێرە'}</span>`;
    });
    
    // تۆمارکردنی هاتن
    function saveCheckin() {
        const employee = document.getElementById('employeeSelect').value;
        const employeeCode = document.getElementById('employeeCode').value;
        const location = document.getElementById('locationSelect').value;
        const device = document.getElementById('deviceSelect').value;
        const note = document.getElementById('checkinNote').value;
        const time = document.getElementById('checkinTime').innerText;
        const date = document.getElementById('checkinDate').innerText;
        
        if (!employee) {
            alert('تکایە کارمەندێک هەڵبژێرە!');
            return;
        }
        
        if (!employeeCode) {
            alert('تکایە کۆدی کارمەند پڕ بکەوە!');
            return;
        }
        
        const checkinData = {
            employee: employee,
            employeeCode: employeeCode,
            location: location,
            device: device,
            time: time,
            date: date,
            note: note,
            checkinTime: new Date().toISOString(),
            status: 'checked_in'
        };
        
        // پاشەکەوتکردن لە localStorage
        let checkins = JSON.parse(localStorage.getItem('checkins') || '[]');
        checkins.push(checkinData);
        localStorage.setItem('checkins', JSON.stringify(checkins));
        
        // پیشاندانی پەیامی سەرکەوتن
        const successBox = document.getElementById('successBox');
        successBox.classList.add('show');
        
        // ڕوونکردنەوەی فۆڕم دوای 2 چرکە
        setTimeout(() => {
            successBox.classList.remove('show');
            document.getElementById('employeeSelect').value = '';
            document.getElementById('employeeCode').value = '';
            document.getElementById('checkinNote').value = '';
        }, 2000);
        
        console.log('Check-in Saved:', checkinData);
        alert(`✅ هاتن بۆ کارمەندی ${employee} لە کاتی ${time}دا تۆمار کرا!`);
    }
    
    // گەیاندنی شوێنی ئێستا (ئەگەر GPS بەکاربهێنرێت)
    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                document.getElementById('locationInfo').innerHTML += `<br><span>📍 GPS: ${lat}, ${lng}</span>`;
            }, function(error) {
                console.log('GPS error:', error);
            });
        }
    }
    
    // بانگهێشتکردنی GPS ئەگەر شوێنی دەرەوە هەڵبژێردرێت
    document.getElementById('locationSelect').addEventListener('change', function() {
        if (this.value === 'شوێنی دەرەوە (Field)') {
            getCurrentLocation();
        }
    });
</script>
</body>
</html>
