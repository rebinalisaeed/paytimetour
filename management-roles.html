<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆڵ و دەسەڵات - Pay Time Tour</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: #dce8f8; padding: 20px; direction: rtl; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { background: #2d4a7a; color: white; padding: 15px 20px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .back-btn { background: #d32f2f; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .back-btn:hover { background: #b71c1c; }
        .content { background: white; padding: 25px; border-radius: 0 0 10px 10px; }
        .role-card { background: #e8e8e8; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .role-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .role-header h3 { color: #2d4a7a; }
        .permission-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 15px; }
        .permission-item { display: flex; align-items: center; gap: 8px; background: white; padding: 8px; border-radius: 5px; }
        .add-role-btn { background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .edit-role-btn { background: #ff9800; color: white; border: none; padding: 5px 12px; border-radius: 3px; cursor: pointer; }
        .delete-role-btn { background: #d32f2f; color: white; border: none; padding: 5px 12px; border-radius: 3px; cursor: pointer; margin-right: 5px; }
        .save-permissions-btn { background: #2e7d32; color: white; border: none; padding: 5px 12px; border-radius: 3px; cursor: pointer; margin-top: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 25px; border-radius: 10px; width: 400px; max-width: 90%; }
        .modal-content input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔐 ڕۆڵ و دەسەڵاتەکان (Roles & Permissions)</h1>
        <a href="index.html" class="back-btn">◀ گەڕانەوە بۆ سەرەکی</a>
    </div>
    <div class="content">
        <button class="add-role-btn" onclick="openRoleModal()">➕ زیادکردنی ڕۆڵی نوێ</button>
        
        <div id="rolesContainer"></div>
    </div>
</div>

<div id="roleModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">زیادکردنی ڕۆڵ</h3>
        <input type="hidden" id="editRoleId">
        <input type="text" id="roleName" placeholder="ناوی ڕۆڵ" required>
        <button class="modal-btn" onclick="saveRole()">💾 پاشەکەوتکردن</button>
        <button class="modal-btn close-modal" onclick="closeRoleModal()">داخستن</button>
    </div>
</div>

<script>
    let roles = [];
    
    const allPermissions = [
        { id: 'view_employees', name: 'بینینی کارمەندان' },
        { id: 'edit_employees', name: 'دەستکاری کارمەندان' },
        { id: 'delete_employees', name: 'سڕینەوەی کارمەندان' },
        { id: 'view_attendance', name: 'بینینی هاتن و دەرچوون' },
        { id: 'edit_attendance', name: 'دەستکاری هاتن و دەرچوون' },
        { id: 'view_reports', name: 'بینینی ڕاپۆرتەکان' },
        { id: 'export_data', name: 'هەناردنی داتا' },
        { id: 'manage_users', name: 'بەڕێوەبردنی بەکارهێنەران' },
        { id: 'manage_roles', name: 'بەڕێوەبردنی ڕۆڵەکان' },
        { id: 'system_settings', name: 'ڕێکخستنەکانی سیستەم' },
        { id: 'view_logs', name: 'بینینی لۆگەکان' }
    ];
    
    function loadRoles() {
        roles = JSON.parse(localStorage.getItem('systemRoles') || '[]');
        if (roles.length === 0) {
            roles = [
                { id: 1, name: 'Admin', permissions: allPermissions.map(p => p.id) },
                { id: 2, name: 'Manager', permissions: ['view_employees', 'edit_employees', 'view_attendance', 'edit_attendance', 'view_reports'] },
                { id: 3, name: 'User', permissions: ['view_employees', 'view_attendance'] },
                { id: 4, name: 'Viewer', permissions: ['view_employees', 'view_attendance', 'view_reports'] }
            ];
            localStorage.setItem('systemRoles', JSON.stringify(roles));
        }
        displayRoles();
    }
    
    function displayRoles() {
        const container = document.getElementById('rolesContainer');
        container.innerHTML = roles.map(role => `
            <div class="role-card">
                <div class="role-header">
                    <h3>📌 ${role.name}</h3>
                    <div>
                        <button class="edit-role-btn" onclick="editRole(${role.id})">✏️ دەستکاری ناو</button>
                        <button class="delete-role-btn" onclick="deleteRole(${role.id})">🗑 سڕینەوە</button>
                    </div>
                </div>
                <div class="permission-list">
                    ${allPermissions.map(perm => `
                        <label class="permission-item">
                            <input type="checkbox" class="perm-${role.id}" value="${perm.id}" ${role.permissions.includes(perm.id) ? 'checked' : ''} onchange="updatePermissions(${role.id})">
                            <span>${perm.name}</span>
                        </label>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }
    
    function updatePermissions(roleId) {
        const role = roles.find(r => r.id === roleId);
        if (role) {
            const checkedBoxes = document.querySelectorAll(`.perm-${roleId}:checked`);
            role.permissions = Array.from(checkedBoxes).map(cb => cb.value);
            localStorage.setItem('systemRoles', JSON.stringify(roles));
        }
    }
    
    function openRoleModal() {
        document.getElementById('modalTitle').innerText = 'زیادکردنی ڕۆڵ';
        document.getElementById('editRoleId').value = '';
        document.getElementById('roleName').value = '';
        document.getElementById('roleModal').style.display = 'flex';
    }
    
    function closeRoleModal() {
        document.getElementById('roleModal').style.display = 'none';
    }
    
    function editRole(id) {
        const role = roles.find(r => r.id === id);
        if (role) {
            document.getElementById('modalTitle').innerText = 'دەستکاری ڕۆڵ';
            document.getElementById('editRoleId').value = role.id;
            document.getElementById('roleName').value = role.name;
            document.getElementById('roleModal').style.display = 'flex';
        }
    }
    
    function saveRole() {
        const id = document.getElementById('editRoleId').value;
        const name = document.getElementById('roleName').value;
        if (!name) { alert('تکایە ناوی ڕۆڵ پڕ بکەوە!'); return; }
        
        if (id) {
            const index = roles.findIndex(r => r.id === parseInt(id));
            if (index !== -1) roles[index].name = name;
        } else {
            roles.push({ id: Date.now(), name: name, permissions: [] });
        }
        
        localStorage.setItem('systemRoles', JSON.stringify(roles));
        closeRoleModal();
        displayRoles();
        alert('✅ ڕۆڵ پاشەکەوت کرا!');
    }
    
    function deleteRole(id) {
        if (confirm('دڵنیای لە سڕینەوەی ئەم ڕۆڵە؟')) {
            roles = roles.filter(r => r.id !== id);
            localStorage.setItem('systemRoles', JSON.stringify(roles));
            displayRoles();
            alert('ڕۆڵ سڕایەوە!');
        }
    }
    
    loadRoles();
</script>
</body>
</html>
