<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕێکخستنی گرێبەست - Pay Time Tour</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: #dce8f8; padding: 20px; direction: rtl; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { background: #2d4a7a; color: white; padding: 15px 20px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .back-btn { background: #d32f2f; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .back-btn:hover { background: #b71c1c; }
        .content { background: white; padding: 25px; border-radius: 0 0 10px 10px; }
        .silver-box { background: #e8e8e8; border: 1px solid #ccc; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .info-row { display: flex; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        .info-label { width: 160px; font-weight: 700; color: #2d4a7a; }
        .info-value { flex: 1; }
        .info-value input, .info-value select { width: 100%; max-width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        .contract-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .contract-table th, .contract-table td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 12px; }
        .contract-table th { background: #2d4a7a; color: white; }
        .add-btn { background: #2e7d32; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
        .edit-btn { background: #ff9800; color: white; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; }
        .delete-btn { background: #d32f2f; color: white; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 25px; border-radius: 10px; width: 500px; max-width: 90%; }
        .modal-content input, .modal-content select { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        h3 { color: #2d4a7a; margin-bottom: 15px; border-right: 4px solid #2d4a7a; padding-right: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📄 ڕێکخستنی گرێبەست (Contract Management)</h1>
        <a href="index.html" class="back-btn">◀ گەڕانەوە بۆ سەرەکی</a>
    </div>
    <div class="content">
        <button class="add-btn" onclick="openContractModal()">➕ زیادکردنی گرێبەستی نوێ</button>
        
        <div style="overflow-x: auto;">
            <table class="contract-table" id="contractsTable">
                <thead>
                    <tr><th>#</th><th>ناوی کارمەند</th><th>جۆری گرێبەست</th><th>مووچەی بنەڕەت</th><th>ڕێکەوتی دەستپێک</th><th>ڕێکەوتی کۆتایی</th><th>دۆخ</th><th>کردار</th></tr>
                </thead>
                <tbody id="contractsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="contractModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">زیادکردنی گرێبەست</h3>
        <input type="hidden" id="editContractId">
        <select id="contractEmployee">
            <option value="">-- هەڵبژاردنی کارمەند --</option>
            <option value="ئەحمەد علی">ئەحمەد علی (1001)</option>
            <option value="سارا محمد">سارا محمد (1002)</option>
            <option value="کارزان حسێن">کارزان حسێن (1003)</option>
        </select>
        <select id="contractType">
            <option value="permanent">دائمی (Permanent)</option>
            <option value="fixed">ماوەی دیاریکراو (Fixed Term)</option>
            <option value="probation">ماوەی تاقیکردنەوە (Probation)</option>
        </select>
        <input type="number" id="contractSalary" placeholder="مووچەی بنەڕەت (IQD)" required>
        <input type="date" id="contractStartDate" required>
        <input type="date" id="contractEndDate">
        <select id="contractStatus">
            <option value="active">چالاک</option>
            <option value="expired">بەسەرچوو</option>
            <option value="terminated">وەستێنراو</option>
        </select>
        <button class="save-btn" onclick="saveContract()">💾 پاشەکەوتکردن</button>
        <button class="close-modal" onclick="closeContractModal()">داخستن</button>
    </div>
</div>

<script>
    let contracts = [];
    
    function loadContracts() {
        contracts = JSON.parse(localStorage.getItem('employeeContracts') || '[]');
        displayContracts();
    }
    
    function displayContracts() {
        const tbody = document.getElementById('contractsBody');
        if (contracts.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">هیچ گرێبەستێک نیە</td></tr>';
            return;
        }
        tbody.innerHTML = contracts.map((contract, idx) => `
            <tr>
                <td>${idx+1}</td>
                <td>${contract.employee}</td>
                <td>${contract.type === 'permanent' ? 'دائمی' : contract.type === 'fixed' ? 'ماوەی دیاریکراو' : 'ماوەی تاقیکردنەوە'}</td>
                <td>${parseInt(contract.salary).toLocaleString()} IQD</td>
                <td>${contract.startDate}</td>
                <td>${contract.endDate || '—'}</td>
                <td style="color:${contract.status === 'active' ? '#2e7d32' : '#d32f2f'}">${contract.status === 'active' ? 'چالاک' : contract.status === 'expired' ? 'بەسەرچوو' : 'وەستێنراو'}</td>
                <td>
                    <button class="edit-btn" onclick="editContract(${contract.id})">✏️</button>
                    <button class="delete-btn" onclick="deleteContract(${contract.id})">🗑</button>
                </td>
            </tr>
        `).join('');
    }
    
    function openContractModal() {
        document.getElementById('modalTitle').innerText = 'زیادکردنی گرێبەست';
        document.getElementById('editContractId').value = '';
        document.getElementById('contractEmployee').value = '';
        document.getElementById('contractType').value = 'permanent';
        document.getElementById('contractSalary').value = '';
        document.getElementById('contractStartDate').value = '';
        document.getElementById('contractEndDate').value = '';
        document.getElementById('contractStatus').value = 'active';
        document.getElementById('contractModal').style.display = 'flex';
    }
    
    function closeContractModal() {
        document.getElementById('contractModal').style.display = 'none';
    }
    
    function editContract(id) {
        const contract = contracts.find(c => c.id === id);
        if (contract) {
            document.getElementById('modalTitle').innerText = 'دەستکاری گرێبەست';
            document.getElementById('editContractId').value = contract.id;
            document.getElementById('contractEmployee').value = contract.employee;
            document.getElementById('contractType').value = contract.type;
            document.getElementById('contractSalary').value = contract.salary;
            document.getElementById('contractStartDate').value = contract.startDate;
            document.getElementById('contractEndDate').value = contract.endDate || '';
            document.getElementById('contractStatus').value = contract.status;
            document.getElementById('contractModal').style.display = 'flex';
        }
    }
    
    function saveContract() {
        const id = document.getElementById('editContractId').value;
        const contractData = {
            id: id ? parseInt(id) : Date.now(),
            employee: document.getElementById('contractEmployee').value,
            type: document.getElementById('contractType').value,
            salary: parseFloat(document.getElementById('contractSalary').value),
            startDate: document.getElementById('contractStartDate').value,
            endDate: document.getElementById('contractEndDate').value || null,
            status: document.getElementById('contractStatus').value,
            updatedAt: new Date().toISOString()
        };
        
        if (!contractData.employee || !contractData.salary || !contractData.startDate) {
            alert('تکایە هەموو خانە پێویستەکان پڕ بکەوە!');
            return;
        }
        
        if (id) {
            const index = contracts.findIndex(c => c.id === parseInt(id));
            if (index !== -1) contracts[index] = contractData;
        } else {
            contracts.push(contractData);
        }
        
        localStorage.setItem('employeeContracts', JSON.stringify(contracts));
        closeContractModal();
        displayContracts();
        alert('✅ گرێبەست پاشەکەوت کرا!');
    }
    
    function deleteContract(id) {
        if (confirm('دڵنیای لە سڕینەوەی ئەم گرێبەستە؟')) {
            contracts = contracts.filter(c => c.id !== id);
            localStorage.setItem('employeeContracts', JSON.stringify(contracts));
            displayContracts();
            alert('گرێبەست سڕایەوە!');
        }
    }
    
    loadContracts();
</script>
</body>
</html>
