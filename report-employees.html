<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕاپۆرتی زانیاری کارمەندان - Pay Time Tour</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: #dce8f8; padding: 20px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #2d4a7a; color: white; padding: 15px 20px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .back-btn { background: #d32f2f; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .back-btn:hover { background: #b71c1c; }
        .content { background: white; padding: 25px; border-radius: 0 0 10px 10px; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filters input { padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        .report-table { width: 100%; border-collapse: collapse; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 12px; }
        .report-table th { background: #2d4a7a; color: white; }
        .export-btn { background: #2e7d32; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        h3 { color: #2d4a7a; margin-bottom: 15px; border-right: 4px solid #2d4a7a; padding-right: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>👥 ڕاپۆرتی زانیاری کارمەندان (Employees Report)</h1>
        <a href="index.html" class="back-btn">◀ گەڕانەوە بۆ سەرەکی</a>
    </div>
    <div class="content">
        <div class="filters">
            <input type="text" id="searchInput" placeholder="ناوی کارمەند...">
            <button class="export-btn" onclick="exportReport()">📎 Export to CSV</button>
            <button onclick="loadReport()" style="background:#2d4a7a; color:white; border:none; padding:8px 16px; border-radius:5px; cursor:pointer;">🔍 نمایش</button>
        </div>
        
        <div style="overflow-x: auto;">
            <table class="report-table" id="reportTable">
                <thead><tr><th>#</th><th>کۆد</th><th>ناوی کارمەند</th><th>ناوی باوک</th><th>پلە</th><th>گروپ</th><th>جۆری دامەزراندن</th><th>شوێن</th><th>مۆبایل</th></tr></thead>
                <tbody id="reportBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const employees = [
        { code: '1001', name: 'ئەحمەد علی', fatherName: 'عەلی محەمەد', position: 'ئەندازیار', group: 'گروپ A', type: 'بەردەوام', location: 'شاخەی سەرەکی', mobile: '07501234567' },
        { code: '1002', name: 'سارا محمد', fatherName: 'محەمەد رەحیم', position: 'بەڕێوەبەر', group: 'گروپ B', type: 'بەکارهاتوو', location: 'لقی باکور', mobile: '07701234567' },
        { code: '1003', name: 'کارزان حسێن', fatherName: 'حسێن عەزیز', position: 'تەکنیکار', group: 'گروپ A', type: 'بەردەوام', location: 'شاخەی سەرەکی', mobile: '07801234567' }
    ];
    
    function loadReport() {
        const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
        let filtered = employees;
        if (searchTerm) filtered = employees.filter(e => e.name.toLowerCase().includes(searchTerm) || e.code.includes(searchTerm));
        
        const tbody = document.getElementById('reportBody');
        tbody.innerHTML = filtered.map((emp, idx) => `<tr>
            <td>${idx+1}</td><td>${emp.code}</td><td>${emp.name}</td><td>${emp.fatherName || '—'}</td>
            <td>${emp.position || '—'}</td><td>${emp.group || '—'}</td><td>${emp.type || '—'}</td>
            <td>${emp.location || '—'}</td><td>${emp.mobile || '—'}</td>
        </table>`).join('');
    }
    
    function exportReport() {
        let csv = "ژمارە,کۆد,ناوی کارمەند,ناوی باوک,پلە,گروپ,جۆری دامەزراندن,شوێن,مۆبایل\n";
        employees.forEach((emp, idx) => {
            csv += `${idx+1},${emp.code},${emp.name},${emp.fatherName || ''},${emp.position || ''},${emp.group || ''},${emp.type || ''},${emp.location || ''},${emp.mobile || ''}\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `employees_report_${new Date().toISOString().slice(0,19)}.csv`;
        link.click();
        alert('ڕاپۆرت Export کرا!');
    }
    
    loadReport();
</script>
</body>
</html>
