<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕاپۆرتی مووچە - Pay Time Tour</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: #dce8f8; padding: 20px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #2d4a7a; color: white; padding: 15px 20px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .back-btn { background: #d32f2f; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .back-btn:hover { background: #b71c1c; }
        .content { background: white; padding: 25px; border-radius: 0 0 10px 10px; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filters select, .filters input { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; }
        .report-table { width: 100%; border-collapse: collapse; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 12px; }
        .report-table th { background: #2d4a7a; color: white; }
        .export-btn { background: #2e7d32; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        .total-row { background: #e8e8e8; font-weight: bold; }
        h3 { color: #2d4a7a; margin-bottom: 15px; border-right: 4px solid #2d4a7a; padding-right: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 ڕاپۆرتی زیادکردن/کەمکردنەوەی مووچە</h1>
        <a href="index.html" class="back-btn">◀ گەڕانەوە بۆ سەرەکی</a>
    </div>
    <div class="content">
        <div class="filters">
            <select id="filterType">
                <option value="all">هەموو</option>
                <option value="increase">تەنها زیادکردن</option>
                <option value="decrease">تەنها کەمکردن</option>
            </select>
            <input type="date" id="filterDate">
            <input type="text" id="filterEmployee" placeholder="ناوی کارمەند">
            <button class="export-btn" onclick="exportReport()">📎 Export to CSV</button>
            <button onclick="loadReport()" style="background:#2d4a7a; color:white; border:none; padding:8px 16px; border-radius:5px; cursor:pointer;">🔍 نمایش</button>
        </div>
        
        <div style="overflow-x: auto;">
            <table class="report-table" id="reportTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>ڕێکەوت</th>
                        <th>ناوی کارمەند</th>
                        <th>جۆر</th>
                        <th>نرخ</th>
                        <th>یەکە</th>
                        <th>هۆکار</th>
                    </tr>
                </thead>
                <tbody id="reportBody"></tbody>
                <tfoot id="reportFooter"></tfoot>
            </table>
        </div>
    </div>
</div>

<script>
    function loadReport() {
        let adjustments = JSON.parse(localStorage.getItem('salaryAdjustments') || '[]');
        const filterType = document.getElementById('filterType').value;
        const filterDate = document.getElementById('filterDate').value;
        const filterEmployee = document.getElementById('filterEmployee').value.trim().toLowerCase();
        
        if (filterType !== 'all') adjustments = adjustments.filter(a => a.type === filterType);
        if (filterDate) adjustments = adjustments.filter(a => a.date === filterDate);
        if (filterEmployee) adjustments = adjustments.filter(a => a.employee.toLowerCase().includes(filterEmployee));
        
        adjustments.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        
        let totalIncrease = 0;
        let totalDecrease = 0;
        
        const tbody = document.getElementById('reportBody');
        if (adjustments.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">هیچ تۆمارێک نەدۆزرایەوە</td></tr>';
            document.getElementById('reportFooter').innerHTML = '';
            return;
        }
        
        tbody.innerHTML = adjustments.map((adj, idx) => {
            if (adj.type === 'increase') totalIncrease += adj.amount;
            else totalDecrease += adj.amount;
            
            return `
                <tr>
                    <td>${idx+1}</td>
                    <td>${adj.date || '—'}</td>
                    <td>${adj.employee}</td>
                    <td style="color:${adj.type === 'increase' ? '#2e7d32' : '#d32f2f'}">${adj.type === 'increase' ? '➕ زیادکردن' : '➖ کەمکردن'}</td>
                    <td>${adj.amount.toLocaleString()}</td>
                    <td>${adj.unit === 'percentage' ? '%' : 'IQD'}</td>
                    <td>${adj.reason || '—'}</td>
                </tr>
            `;
        }).join('');
        
        document.getElementById('reportFooter').innerHTML = `
            <tr class="total-row">
                <td colspan="3"><strong>کۆی گشتی</strong></td>
                <td><strong style="color:#2e7d32;">+ ${totalIncrease.toLocaleString()}</strong></td>
                <td colspan="2"><strong style="color:#d32f2f;">- ${totalDecrease.toLocaleString()}</strong></td>
                <td></td>
            </tr>
        `;
    }
    
    function exportReport() {
        const adjustments = JSON.parse(localStorage.getItem('salaryAdjustments') || '[]');
        if (adjustments.length === 0) {
            alert('هیچ تۆمارێک نیە بۆ هەناردن!');
            return;
        }
        
        let csv = "ژمارە,ڕێکەوت,ناوی کارمەند,جۆر,نرخ,یەکە,هۆکار\n";
        adjustments.forEach((adj, idx) => {
            csv += `${idx+1},${adj.date || ''},${adj.employee},${adj.type === 'increase' ? 'زیادکردن' : 'کەمکردن'},${adj.amount},${adj.unit === 'percentage' ? '%' : 'IQD'},${adj.reason || ''}\n`;
        });
        
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `salary_report_${new Date().toISOString().slice(0,19)}.csv`;
        link.click();
        alert('ڕاپۆرت Export کرا!');
    }
    
    loadReport();
</script>
</body>
</html>
